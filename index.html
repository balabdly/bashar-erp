<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Bashar Pro — ERP الإنشائي</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a56db">
  <meta name="mobile-web-app-capable" content="yes\">\n  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bashar ERP">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --primary: #1a56db;
  --primary-dark: #1240a8;
  --primary-light: #eff6ff;
  --text-main: #1f2937;
  --text-muted: #4b5563;
  --bg-main: #f9fafb;
  --bg-card: #ffffff;
  --border: #e5e7eb;
}
body {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  background-color: var(--bg-main);
  color: var(--text-main);
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  background: var(--bg-card);
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}
h1 { color: var(--primary); text-align: center; }
.status-msg {
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  background: #ecfdf5;
  color: #065f46;
  text-align: center;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
  <h1>Bashar Pro — ERP الإنشائي السحابي 🚀</h1>
  <div class="status-msg">النظام متصل بنجاح بسيرفر بايثون السحابي ومحمي بالكامل</div>
  
  <div style="margin-top: 30px; padding: 20px; border: 1px solid var(--border); border-radius: 8px;">
    <h3>إضافة مشروع جديد في بايثون:</h3>
    <input type="text" id="projName" placeholder="اسم المشروع" style="padding: 8px; margin: 5px; width: 200px;">
    <input type="text" id="projEng" placeholder="المهندس المسؤول" style="padding: 8px; margin: 5px; width: 150px;">
    <input type="number" id="projVal" placeholder="قيمة المشروع" style="padding: 8px; margin: 5px; width: 120px;">
    <button onclick="addNewProject()" style="padding: 8px 15px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer;">حفظ في السحاب</button>
  </div>

  <h3 style="margin-top: 40px;">قائمة المشاريع الحالية في قاعدة البيانات السحابية:</h3>
  <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
    <thead>
      <tr style="background: var(--primary-light); text-align: right;">
        <th style="padding: 10px; border-bottom: 2px solid var(--border);">رقم المشروع</th>
        <th style="padding: 10px; border-bottom: 2px solid var(--border);">اسم المشروع</th>
        <th style="padding: 10px; border-bottom: 2px solid var(--border);">المهندس</th>
        <th style="padding: 10px; border-bottom: 2px solid var(--border);">القيمة</th>
      </tr>
    </thead>
    <tbody id="projectsTableBody">
      </tbody>
  </table>
</div>

<script>
// مصفوفات البيانات الأساسية للنظام
let projects = [];
let inventory = [];

// دالة ذكية لإرسال وحفظ البيانات داخل سيرفر بايثون السحابي على Render فوراً
async function syncStorage() {
  localStorage.setItem("erp_projects", JSON.stringify(projects));
  localStorage.setItem("erp_inventory", JSON.stringify(inventory));

  try {
    // الاتصال التلقائي بالسيرفر الحالي السحابي
    await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(projects)
    });
    
    await fetch('/api/inventory', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(inventory)
    });
    console.log("تم الحفظ والمزامنة بنجاح داخل قاعدة بيانات بايثون السحابية.");
  } catch (error) {
    console.error("خطأ في المزامنة السحابية وبايثون:", error);
  }
}

// دالة جلب البيانات من بايثون وتحديث الشاشة فور فتح النظام من أي مكان
async function loadDataFromPython() {
  try {
    const resProjects = await fetch('/api/projects');
    if(resProjects.ok) {
      const data = await resProjects.ok ? await resProjects.json() : [];
      if(data && data.length > 0) {
        projects = data;
      }
    }
    
    const resInventory = await fetch('/api/inventory');
    if(resInventory.ok) {
      const data = await resInventory.json();
      if(data && data.length > 0) {
        inventory = data;
      }
    }
    
    renderProjectsList();
  } catch (e) {
    console.log("تعذر جلب البيانات من السحاب، تم الاعتماد على ذاكرة المتصفح الاحتياطية:", e);
    // استرجاع البيانات محلياً لو انقطع الإنترنت
    projects = JSON.parse(localStorage.getItem("erp_projects")) || [];
    inventory = JSON.parse(localStorage.getItem("erp_inventory")) || [];
    renderProjectsList();
  }
}

// دالة لعرض جدول المشاريع القادم من بايثون
function renderProjectsList() {
  const tbody = document.getElementById('projectsTableBody');
  if(!tbody) return;
  tbody.innerHTML = '';
  
  if(projects.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="padding:15px; text-align:center; color:var(--text-muted);">لا توجد مشاريع محفوظة حالياً في السحاب. جرب إضافة مشروع!</td></tr>';
    return;
  }

  projects.forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="padding: 10px; border-bottom: 1px solid var(--border);">${p.id}</td>
      <td style="padding: 10px; border-bottom: 1px solid var(--border); font-weight:bold;">${p.name || ''}</td>
      <td style="padding: 10px; border-bottom: 1px solid var(--border);">${p.engineer || ''}</td>
      <td style="padding: 10px; border-bottom: 1px solid var(--border); color:var(--primary); font-weight:bold;">${p.value || 0} ريال</td>
    `;
    tbody.appendChild(tr);
  });
}

// دالة إضافة مشروع جديد
function addNewProject() {
  const name = document.getElementById('projName').value;
  const engineer = document.getElementById('projEng').value;
  const value = parseFloat(document.getElementById('projVal').value) || 0;

  if(!name || !engineer) {
    alert("الرجاء إدخال اسم المشروع واسم المهندس أولاً!");
    return;
  }

  const newProj = {
    id: Date.now().toString(), // توليد رقم فرعي عشوائي
    name: name,
    code: "PRJ-" + Math.floor(Math.random() * 900),
    type: "إنشائي عام",
    engineer: engineer,
    status: "قيد التنفيذ",
    value: value,
    progress: 0,
    startDate: new Date().toISOString().split('T')[0],
    endDate: new Date().toISOString().split('T')[0]
  };

  projects.push(newProj);
  renderProjectsList();
  syncStorage(); // حفظ فوري في بايثون

  // تفريغ المدخلات
  document.getElementById('projName').value = '';
  document.getElementById('projEng').value = '';
  document.getElementById('projVal').value = '';
}

// تشغيل جلب البيانات فور فتح الصفحة مباشرة
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(loadDataFromPython, 300); 
});
</script>

</body>
</html>
