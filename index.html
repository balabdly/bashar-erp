<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Bashar Pro — ERP الإنشائي</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a56db">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bashar ERP">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --primary: #1a56db;
  --primary-dark: #1240a8;
  --primary-light: #e8f0fd;
  --primary-mid: #c7d9fa;
  --accent: #0ea77b;
  --accent-light: #d1faea;
  --warn: #e6820a;
  --warn-light: #fef3e2;
  --danger: #c81e1e;
  --danger-light: #fde8e8;
  --surface: #ffffff;
  --bg: #f0f2f8;
  --bg2: #e8eaf3;
  --border: #dde1ee;
  --text: #1a1d2e;
  --text2: #4a4f6a;
  --text3: #8890b0;
  --sidebar-w: 248px;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(26,40,80,.07), 0 4px 16px rgba(26,40,80,.06);
  --shadow-sm: 0 1px 4px rgba(26,40,80,.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ───── SIDEBAR ───── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-left: 1px solid var(--border);
  height: 100vh;
  position: fixed;
  top: 0;
  right: 0;
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
}
.sidebar-brand .logo-mark {
  width: 36px; height: 36px;
  background: var(--primary);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
}
.sidebar-brand .logo-mark svg { width: 20px; height: 20px; fill: white; }
.sidebar-brand h1 {
  font-size: 15px; font-weight: 700; color: var(--text);
  letter-spacing: -.3px; line-height: 1.2;
}
.sidebar-brand p { font-size: 11px; color: var(--text3); margin-top: 2px; }

.sidebar-section-label {
  font-size: 10px; font-weight: 600;
  color: var(--text3);
  letter-spacing: .8px;
  text-transform: uppercase;
  padding: 18px 20px 6px;
}

.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  color: var(--text2);
  font-size: 13.5px; font-weight: 500;
  border-right: 3px solid transparent;
  transition: all .15s ease;
  text-decoration: none;
  margin: 1px 8px 1px 0;
  border-radius: 0 0 0 0;
}
.sidebar-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: .7; }
.sidebar-item:hover { background: var(--primary-light); color: var(--primary); }
.sidebar-item:hover svg { opacity: 1; }
.sidebar-item.active {
  background: var(--primary-light);
  color: var(--primary);
  border-right-color: var(--primary);
  font-weight: 600;
}
.sidebar-item.active svg { opacity: 1; }

.sidebar-footer {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text3);
  text-align: center;
}

/* ───── MAIN ───── */
.main {
  margin-right: var(--sidebar-w);
  min-height: 100vh;
  padding: 28px 28px 40px;
  max-width: 1440px;
}

/* ───── PAGE HEADER ───── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.page-header h2 {
  font-size: 20px; font-weight: 700; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.page-header h2 .ph-icon {
  width: 36px; height: 36px;
  background: var(--primary-light);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.page-header h2 .ph-icon svg { width: 18px; height: 18px; stroke: var(--primary); fill: none; stroke-width: 2; }

/* ───── PAGES ───── */
.page { display: none; }
.page.active-page { display: block; }

/* ───── KPI CARDS ───── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 4px; height: 100%;
  border-radius: 0 var(--radius) var(--radius) 0;
}
.kpi-card.blue::before { background: var(--primary); }
.kpi-card.green::before { background: var(--accent); }
.kpi-card.amber::before { background: var(--warn); }
.kpi-card.red::before { background: var(--danger); }

.kpi-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.kpi-label { font-size: 12.5px; color: var(--text2); font-weight: 500; }
.kpi-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.kpi-icon svg { width: 20px; height: 20px; stroke-width: 1.8; fill: none; }
.kpi-icon.blue { background: var(--primary-light); }
.kpi-icon.blue svg { stroke: var(--primary); }
.kpi-icon.green { background: var(--accent-light); }
.kpi-icon.green svg { stroke: var(--accent); }
.kpi-icon.amber { background: var(--warn-light); }
.kpi-icon.amber svg { stroke: var(--warn); }
.kpi-icon.red { background: var(--danger-light); }
.kpi-icon.red svg { stroke: var(--danger); }

.kpi-number {
  font-size: 30px; font-weight: 700; color: var(--text);
  line-height: 1; margin-bottom: 6px;
}
.kpi-change { font-size: 12px; font-weight: 500; }
.kpi-change.up { color: var(--accent); }
.kpi-change.neutral { color: var(--text3); }

/* ───── CHARTS ───── */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.chart-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.chart-card h4 {
  font-size: 13.5px; font-weight: 600; color: var(--text);
  margin-bottom: 16px;
}
.chart-card canvas { max-height: 260px; }

/* ───── SURFACE CARD ───── */
.surface-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.surface-card .card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}
.surface-card .card-header h3 { font-size: 14px; font-weight: 600; }
.surface-card .card-body { padding: 20px; }

/* ───── BUTTONS ───── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border: none; border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 600;
  transition: all .15s ease;
  white-space: nowrap;
}
.btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-success { background: var(--accent); color: white; }
.btn-success:hover { background: #0b8f69; }
.btn-warning { background: var(--warn); color: white; }
.btn-warning:hover { background: #c06a00; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #a01515; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg); }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 5px; }

/* ───── TABLE ───── */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  min-width: 580px;
}
thead th {
  background: #f5f6fb;
  padding: 11px 14px;
  text-align: right;
  font-size: 12px; font-weight: 600;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody td {
  padding: 12px 14px;
  text-align: right;
  font-size: 13px;
  color: var(--text);
  border-bottom: 1px solid #f0f2f8;
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #fafbff; }
code {
  font-family: 'Courier New', monospace;
  font-size: 11.5px;
  background: var(--bg2);
  color: var(--primary);
  padding: 2px 6px;
  border-radius: 4px;
}

/* ───── BADGES ───── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 11.5px; font-weight: 600;
  white-space: nowrap;
}
.badge-blue { background: var(--primary-light); color: var(--primary-dark); }
.badge-green { background: var(--accent-light); color: #065f46; }
.badge-amber { background: var(--warn-light); color: #7c4a00; }
.badge-red { background: var(--danger-light); color: #991b1b; }
.badge-gray { background: var(--bg2); color: var(--text2); }

/* ───── PROGRESS BAR ───── */
.progress-wrap { background: var(--bg2); border-radius: 999px; height: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 999px; background: var(--primary); transition: width .3s; }

/* ───── FILTERS BAR ───── */
.filters-bar {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-bottom: 16px; align-items: center;
}
.filters-bar select,
.filters-bar input[type="text"],
.filters-bar input[type="date"] {
  height: 36px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px;
  color: var(--text);
  background: var(--surface);
  min-width: 150px;
  outline: none;
  transition: border-color .15s;
}
.filters-bar select:focus,
.filters-bar input:focus { border-color: var(--primary); }

/* ───── FORM ELEMENTS ───── */
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 12.5px; font-weight: 600;
  color: var(--text2); margin-bottom: 6px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px;
  color: var(--text);
  background: var(--surface);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(26,86,219,.1);
}
.form-group textarea { resize: vertical; min-height: 72px; }

/* ───── TABS ───── */
.tabs-bar {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.tab-pill {
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  color: var(--text2);
  transition: all .15s;
}
.tab-pill:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary-mid); }
.tab-pill.active { background: var(--primary); color: white; border-color: var(--primary); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ───── MODAL ───── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10,15,35,.45);
  backdrop-filter: blur(2px);
  justify-content: center;
  align-items: center;
  z-index: 500;
  padding: 16px;
}
.modal-box {
  background: var(--surface);
  border-radius: 16px;
  width: 480px; max-width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(10,15,35,.2);
}
.modal-box.lg { width: 820px; }
.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h3 { font-size: 15px; font-weight: 700; }
.modal-close {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: none; background: var(--bg);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-size: 18px;
  transition: background .15s;
}
.modal-close:hover { background: var(--danger-light); color: var(--danger); }
.modal-body { padding: 20px 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-start;
}

/* ───── DETAIL VIEW ───── */
.detail-view {
  display: none;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.detail-view.visible { display: block; }
.detail-header {
  padding: 20px 24px;
  background: linear-gradient(135deg, #1a56db08, #0ea77b06);
  border-bottom: 1px solid var(--border);
}
.detail-body { padding: 24px; }

/* ───── INFO ROW ───── */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.info-row { display: flex; flex-direction: column; gap: 3px; }
.info-row .lbl { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
.info-row .val { font-size: 14px; color: var(--text); font-weight: 500; }

/* ───── TIMELINE ───── */
.timeline-item {
  position: relative;
  padding: 10px 16px 10px 12px;
  border-right: 2px solid var(--primary-light);
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text2);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  background: var(--primary-light);
}
.timeline-item::before {
  content: '';
  position: absolute; right: -5px; top: 12px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--primary);
}

/* ───── ALERT BANNER ───── */
.alert {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 14px;
  display: flex; gap: 10px; align-items: flex-start;
}
.alert svg { width: 18px; height: 18px; flex-shrink: 0; stroke-width: 2; fill: none; margin-top: 1px; }
.alert-danger { background: var(--danger-light); color: #7f1d1d; border: 1px solid #fca5a5; }
.alert-danger svg { stroke: var(--danger); }
.alert-success { background: var(--accent-light); color: #064e3b; border: 1px solid #6ee7b7; }
.alert-success svg { stroke: var(--accent); }
.alert-info { background: var(--primary-light); color: #1e3a8a; border: 1px solid var(--primary-mid); }
.alert-info svg { stroke: var(--primary); }

/* ───── SECTION TITLE ───── */
.section-title {
  font-size: 12px; font-weight: 700;
  color: var(--text2);
  text-transform: uppercase; letter-spacing: .7px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* ───── STAT HIGHLIGHT ───── */
.stat-highlight {
  background: var(--primary-light);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.stat-highlight .stat-label { font-size: 13px; color: var(--primary-dark); font-weight: 500; }
.stat-highlight .stat-value { font-size: 26px; font-weight: 700; color: var(--primary); }

/* ───── RESPONSIVE ───── */
@media (max-width: 900px) {
  .sidebar {
    position: static;
    width: 100%;
    height: auto;
    flex-direction: row;
    flex-wrap: wrap;
    border-left: none;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .sidebar-brand { display: none; }
  .sidebar-section-label { display: none; }
  .sidebar-item { padding: 10px 14px; border-right: none; margin: 4px 0; border-radius: var(--radius-sm); }
  .sidebar-item.active { border-right: none; }
  .sidebar-footer { display: none; }
  .main { margin-right: 0; padding: 16px; }
  .charts-grid { grid-template-columns: 1fr; }
  .info-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .modal-box.lg { width: 100%; }
}

/* ───── MOBILE / PWA ───── */
@media (max-width: 768px) {
  .sidebar {
    position: fixed; bottom: 0; left: 0; right: 0; top: auto;
    width: 100%; height: 64px; flex-direction: row;
    padding: 0; z-index: 200; border-top: 1px solid var(--border);
    border-left: none; overflow-x: auto; overflow-y: hidden;
  }
  .sidebar-brand, .sidebar-footer { display: none; }
  .sidebar-nav {
    display: flex; flex-direction: row; width: 100%;
    padding: 0; gap: 0; overflow-x: auto;
  }
  .sidebar-item {
    flex-direction: column; gap: 2px; padding: 6px 10px;
    min-width: 60px; font-size: 10px; border-radius: 0;
    border-right: none; border-top: 3px solid transparent;
    white-space: nowrap; flex-shrink: 0;
  }
  .sidebar-item.active { border-top-color: var(--primary); border-right: none; }
  .sidebar-item svg { width: 20px; height: 20px; }
  .sidebar-item span { font-size: 9px; }
  .main { margin-right: 0; padding-bottom: 80px; }
  .page-header { flex-wrap: wrap; gap: 8px; }
  .page-header h2 { font-size: 16px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-grid { grid-template-columns: 1fr; }
  .modal-box { width: 96vw !important; max-width: 96vw !important; margin: 8px; }
  .modal-box.lg { width: 96vw !important; }
  .table-wrap { overflow-x: auto; }
  .filters-bar { flex-wrap: wrap; gap: 8px; }
  .filters-bar select, .filters-bar input { font-size: 13px; }
  /* Safe area for iPhone */
  .sidebar { padding-bottom: env(safe-area-inset-bottom); height: calc(64px + env(safe-area-inset-bottom)); }
  .main { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi-number { font-size: 20px !important; }
  .btn { padding: 7px 12px; font-size: 12px; }
  .btn-xs { padding: 4px 8px; font-size: 11px; }
}

/* ───── MISC ───── */
.muted { color: var(--text3); }
.text-sm { font-size: 12px; }
.fw-600 { font-weight: 600; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.flex-gap { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.inline-input { display: flex; gap: 8px; margin-top: 12px; }
.inline-input input { flex: 1; }

@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .5; }
}

/* ─── طباعة المستندات الرسمية ─── */
@media print {
  .no-print { display: none !important; }
  .print-page-break { page-break-before: always; }
}
</style>
